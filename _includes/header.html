<header class="site-header" role="banner">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="site-branding" aria-label="{{ site.title }} — Home">
      <div class="logo-mark" aria-hidden="true">
        <span>LATC</span>
      </div>
      <div class="brand-text">
        <span class="brand-name">Lansing Area<br>Track Club</span>
        <span class="brand-tagline">Mid-Michigan Track &amp; Field</span>
      </div>
    </a>

    <div class="header-actions">
      <button class="qr-share-btn" id="qr-share-btn" type="button"
              aria-haspopup="dialog" aria-label="Show QR code to share this page">
        <svg class="qr-share-btn__icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M3 3h8v8H3V3zm2 2v4h4V5H5zm-2 8h8v8H3v-8zm2 2v4h4v-4H5zM13 3h8v8h-8V3zm2 2v4h4V5h-4zm-2 8h2v2h-2v-2zm0 4h2v2h-2v-2zm2 2h2v2h-2v-2zm2-2h2v2h-2v-2zm2 2h2v2h-2v-2zm0-4h2v2h-2v-2zm-4 0h2v2h-2v-2z"/>
        </svg>
        <span class="qr-share-btn__label">Share</span>
      </button>

      <button class="nav-toggle" id="nav-toggle" aria-controls="site-nav" aria-expanded="false" aria-label="Toggle navigation">
        ☰
      </button>
    </div>

    <nav class="site-nav" id="site-nav" role="navigation" aria-label="Main navigation">
      {% for item in site.navigation %}
        <a href="{{ item.url | relative_url }}"
           {% if page.url == item.url or page.url == item.url | append: '/' %}class="active" aria-current="page"{% endif %}>
          {{ item.title }}
        </a>
      {% endfor %}
    </nav>
  </div>
</header>
