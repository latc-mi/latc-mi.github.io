# Grand Ledge Summer Recreation Track & Field — All-Time Championship Records
#
# Only the championship meet (last meet of the season) is eligible for records.
#
# SOURCES
#   - 2018 master PDF "1973–2018 Grand Ledge Summer Rec. Championship Records"
#     (the full listing maintained by the meet directors). Covers up to the 45th
#     annual meet (2018). 46th annual = 2019 used this same PDF (no new posted list).
#   - Facebook update, 2022 (47th annual): records typed in the post text.
#   - Facebook update, 2023 (48th annual): printed result sheets posted as photos,
#     with new records highlighted. New records below were confirmed by comparing the
#     2023 winning marks against the standing record.
#
# KNOWN GAPS (not yet incorporated — records were broken but specifics are not
# available online:
#   - 2020 & 2021: no meets held (COVID).
#   - 2024 (49th annual): "33 new records were broken" — only an emailed PDF + athlete
#     photos were posted; no result data online.
#   - 2025 (50th annual): recap + photo albums only; no result data online.
#   - 2023 5000 m and 4x100 relay: contested at earlier meets, not in the championship
#     sheets, so not updated here.
#
# FIELDS: gender, event, age, name, city (optional), mark, year, set (source year of
#   the current record), note (optional). `members` is used for relays.
#   `history` (optional) is a list of prior/co- holders, newest first — each entry has
#   name (or members) / city / mark / year / note (e.g. "tied", "co-holder"). It powers
#   the drill-in timeline on the records page; add older holders here as they surface.
#
# FLAGGED ITEMS (see notes inline): a few 2023 sheet-highlighted marks did not actually
#   surpass the documented standing record; the faster documented mark is kept and the
#   discrepancy is noted for reconciliation against the master PDF.

meta:
  title: "Grand Ledge Summer Track Championship Records"
  coverage: "1973–2023 (47th/2022 and 48th/2023 updates applied)"
  facebook: "https://www.facebook.com/GrandLedgesummertrack"

